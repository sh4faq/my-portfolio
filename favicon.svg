<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .bg     { fill: #f3ede0; }
    .ink    { fill: #14110d; }
    .accent { fill: #b04a1a; }
    @media (prefers-color-scheme: dark) {
      .bg  { fill: #14110d; }
      .ink { fill: #f3ede0; }
    }
  </style>
  <rect class="bg" width="100" height="100" rx="18"/>
  <text class="ink" x="50" y="74"
        font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
        font-size="78" font-style="italic" font-weight="400"
        text-anchor="middle">H</text>
  <circle class="accent" cx="74" cy="70" r="5.5"/>
</svg>
